<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4a2b22">
    <title>Voz &amp; Cifra | Offline</title>
    <style>
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #140c0c; color: #fff8ed; font-family: Arial, sans-serif; }
        main { width: min(34rem, calc(100% - 2rem)); text-align: center; }
        img { width: 6rem; height: 6rem; object-fit: contain; }
        h1 { margin: 1rem 0 .5rem; }
        p { color: #d8c4a6; line-height: 1.6; }
        button { margin-top: 1rem; border: 1px solid #d6ad6c; border-radius: 999px; background: #6c4a21; color: white; padding: .8rem 1.2rem; font-weight: 800; }
    </style>
</head>
<body>
    <main>
        <img src="/logo/final.png" alt="Voz &amp; Cifra">
        <h1>Você está offline</h1>
        <p>Abra uma página pública enquanto estiver conectado para deixá-la disponível neste aparelho.</p>
        <button type="button" onclick="location.reload()">Tentar novamente</button>
    </main>
</body>
</html>
